name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install minification tools
        run: npm install -g terser clean-css-cli

      - name: Build dist
        run: |
          mkdir dist
          mkdir dist/js

          # Copy static files
          cp index.html favicon.svg og-image.png robots.txt sitemap.xml google4878b2ed0894b6d8.html dist/

          # Bundle all JS in load order → single minified file
          cat js/data.js js/calculator.js js/spots.js js/jobsData.js js/jobs.js \
              js/app.js js/timer.js js/community.js js/nav.js js/theme.js \
              > dist/js/bundle.raw.js
          npx terser dist/js/bundle.raw.js --compress --mangle --output dist/js/bundle.js
          rm dist/js/bundle.raw.js

          # Minify CSS
          npx clean-css-cli -o dist/style.css style.css

          # Rewrite HTML: replace individual js/ script tags with bundle.js
          python3 patch_html.py

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - uses: actions/deploy-pages@v4
        id: deployment
