name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install minification tools
        run: npm install -g terser clean-css-cli

      - name: Build dist
        run: |
          mkdir dist

          # Copy all static files
          cp index.html favicon.svg og-image.png robots.txt sitemap.xml google4878b2ed0894b6d8.html dist/
          cp -r js dist/js

          # Minify CSS
          npx clean-css-cli -o dist/style.css style.css

          # Minify each JS file
          for f in js/*.js; do
            npx terser "$f" --compress --mangle --output "dist/$f"
          done

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - uses: actions/deploy-pages@v4
        id: deployment
